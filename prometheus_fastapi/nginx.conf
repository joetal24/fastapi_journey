events {}

http {
    upstream fastapi_cluster {
        server 172.17.0.1:8001;
        server 172.17.0.1:8002;
    }

    server {
        listen 80;

        location / {
            proxy_pass http://fastapi_cluster;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}